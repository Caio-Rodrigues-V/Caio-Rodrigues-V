name: Update profile metrics

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update language metrics
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_METRICS_TOKEN }}
          PROFILE_USERNAME: Caio-Rodrigues-V
        run: python scripts/update_profile_metrics.py

      - name: Commit README changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Atualiza metricas automaticas do perfil"
          file_pattern: README.md
